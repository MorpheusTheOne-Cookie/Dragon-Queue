<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Dragon Queue</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/61b297af10.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h1 id="title">Sign Up</h1>
            <form>
                <div class="input-group">

                    <div class="input-field" id= "username-field">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" name="username" placeholder="Username" required>
                    </div>

                    <div class="input-field">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" name="email" placeholder="Email" required>
                    </div>
                    
                    <div class="input-field">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" name="password" placeholder="Password" required>
                    </div>

                    <div class="input-field" id = "confirm-password-field">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" name="confirm-password" placeholder="Confirm Password" required>
                    </div>

                    <p id="ForgotPassword"><a href="#">Forgot Password</a></p>
                    
                </div>

                <div class="btn-field">
                    <button type="button" id="sign-up-btn">Sign Up</button>
                    <button type="button" id="sign-in-btn" class="disable">Sign In</button>
                </div>

            </form>
        </div>
    </div>
<script>
let signUpBtn = document.getElementById("sign-up-btn");
let signInBtn = document.getElementById("sign-in-btn");
let usernameField = document.getElementById("username-field");
let confirmPasswordField = document.getElementById("confirm-password-field");
let title = document.getElementById("title");
let forgotPassword = document.getElementById("ForgotPassword");



signInBtn.onclick = function() {
    usernameField.style.maxHeight = "0";
    confirmPasswordField.style.maxHeight = "0";
    forgotPassword.style.display = "block";
    title.innerHTML = "Sign In";
    signUpBtn.classList.add("disable");
    signInBtn.classList.remove("disable");
}

signUpBtn.onclick = function() {
    usernameField.style.maxHeight = "65px";
    confirmPasswordField.style.maxHeight = "65px";
    forgotPassword.style.display = "none";
    title.innerHTML = "Sign Up";
    signUpBtn.classList.remove("disable");
    signInBtn.classList.add("disable");
}
</script>

</body>
</html>
